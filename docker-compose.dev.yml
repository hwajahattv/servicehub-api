services:

  postgres:
    image: postgres:17
    container_name: servicehub-postgres

    environment:
      POSTGRES_DB: servicehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine

    container_name: servicehub-redis

    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4

    container_name: servicehub-pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@servicehub.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

volumes:
  postgres_data: